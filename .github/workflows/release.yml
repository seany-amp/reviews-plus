name: Release

on:
  push:
    branches: [main]

# Skip the auto-generated version-bump commit to avoid an infinite loop.
permissions:
  contents: write

jobs:
  release:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') && !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump patch version
        id: bump
        run: |
          NEW=$(node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            const [maj, min, pat] = pkg.version.split('.').map(Number);
            const v = maj + '.' + min + '.' + (pat + 1);
            pkg.version = v;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json'));
            conf.version = v;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
            console.log(v);
          ")
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit & tag version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(release): v${{ steps.bump.outputs.version }} [skip ci]"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Build app & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ steps.bump.outputs.version }}
          releaseName: reviews-plus v${{ steps.bump.outputs.version }}
          releaseBody: "Automated build for v${{ steps.bump.outputs.version }}. Download the .dmg below."
          releaseDraft: false
          prerelease: false
